name: watch
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Fire a test alert instead of sweeping (verifies the email channel)"
        type: boolean
        default: false

concurrency:
  group: watcher
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Test alert
        if: inputs.test_alert
        run: ./notify-hook "Test alert" "The email channel works. A real alert looks like: Seats open 2026-08-08 7:00pm, F11-F12. You can close this issue."

      - name: Run sweep
        if: ${{ !inputs.test_alert }}
        run: python3 watch.py --once

      - name: Persist state
        run: |
          git config user.name "odyssey-watcher[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add state.json alerts.log 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "state: sweep $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase --autostash origin main || true
            git push
          fi
